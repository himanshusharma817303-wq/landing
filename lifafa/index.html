<script>
const PLAY_STORE_WEB = "https://play.google.com/store/apps/details?id=in.rojsetu.taskapp";
const PLAY_STORE_APP = "market://details?id=in.rojsetu.taskapp";

const params = new URLSearchParams(window.location.search);
const eventId = params.get("e");
const token = params.get("t");

if (!eventId || !token) {
  window.location.href = PLAY_STORE_APP;

  setTimeout(() => {
    window.location.href = PLAY_STORE_WEB;
  }, 1200);
}

const deepLink = `rozsetu://lifafa?e=${encodeURIComponent(eventId)}&t=${encodeURIComponent(token)}`;

let opened = false;

document.addEventListener("visibilitychange", () => {
  if (document.hidden) opened = true;
});
window.addEventListener("blur", () => opened = true);
window.addEventListener("pagehide", () => opened = true);

// app open try
window.location.href = deepLink;

// fallback: first Play Store app, then web
setTimeout(() => {
  if (!opened) {
    window.location.href = PLAY_STORE_APP;

    setTimeout(() => {
      if (!opened) {
        window.location.href = PLAY_STORE_WEB;
      }
    }, 1200);
  }
}, 1600);
</script>
