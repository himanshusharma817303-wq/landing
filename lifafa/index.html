<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening Rozsetu...</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    background:#0B0B10;
    color:white;
}
</style>
</head>

<body>
<p>Opening Rozsetu App...</p>

<script>

const PLAYSTORE_APP = "market://details?id=in.rojsetu.taskapp";

const params = new URLSearchParams(location.search);
const e = params.get("e");
const t = params.get("t");

const deepLink = `rozsetu://lifafa?e=${e}&t=${t}`;

let opened = false;

document.addEventListener("visibilitychange", () => {
    if (document.hidden) opened = true;
});

window.addEventListener("blur", () => {
    opened = true;
});

window.location.href = deepLink;

// fallback → DIRECT PLAYSTORE APP
setTimeout(() => {
    if (!opened) {
        window.location.href = PLAYSTORE_APP;
    }
}, 1500);

</script>

</body>
</html>
