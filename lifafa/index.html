<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Rozsetu...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #0B0B10;
      color: #fff;
      text-align: center;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loader {
      border: 4px solid #333;
      border-top: 4px solid #4CAF50;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="loader"></div>
    <p>Opening App...</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const eventId = params.get("e");
    const token = params.get("t");

    const packageName = "in.rojsetu.taskapp";
    const playStoreApp = `market://details?id=${packageName}`;
    const playStoreWeb = `https://play.google.com/store/apps/details?id=${packageName}`;

    if (!eventId || !token) {
      window.location.href = playStoreApp;

      setTimeout(() => {
        window.location.href = playStoreWeb;
      }, 1200);
    } else {
      const intentUrl =
        `intent://lifafa?e=${encodeURIComponent(eventId)}&t=${encodeURIComponent(token)}` +
        `#Intent;scheme=rozsetu;package=${packageName};end`;

      // App open try
      window.location.href = intentUrl;

      // App nahi hui toh Play Store app
      setTimeout(() => {
        window.location.href = playStoreApp;

        // Agar market:// bhi fail ho toh web Play Store
        setTimeout(() => {
          window.location.href = playStoreWeb;
        }, 1200);
      }, 1800);
    }
  </script>
</body>
</html>
